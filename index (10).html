<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KING CLUB - Final Pro</title>
    <style>
        /* CSS অংশ আগের মতোই আছে */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 400px; background: #fff; min-height: 100vh; position: relative; overflow: hidden; }
        #loginPage { position: fixed; inset: 0; background: #00b894; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .login-box { width: 85%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); color: #333; }
        .nav-bar { display: flex; background: #00b894; padding: 12px; justify-content: space-around; position: sticky; top: 0; z-index: 100; }
        .nav-item { color: white; cursor: pointer; font-weight: 600; font-size: 13px; opacity: 0.7; }
        .nav-item.active { opacity: 1; border-bottom: 3px solid white; }
        .wallet-card { background: white; margin: 15px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .timer-box { background: #00b894; color: white; margin: 10px; padding: 15px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: bold; }
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .n-btn { aspect-ratio: 1; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .chart-header { background: #2ecc71; color: white; display: flex; padding: 10px; border-radius: 5px 5px 0 0; font-weight: bold; text-align: center; margin: 0 15px; }
        .chart-row { display: flex; border-bottom: 1px solid #eee; padding: 10px; text-align: center; margin: 0 15px; font-size: 14px; }
        .col { flex: 1; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; }
        .bet-panel { display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; background: white; border-radius: 25px 25px 0 0; z-index: 201; padding: 20px; }
        .qty-control { display: flex; align-items: center; background: #f1f2f6; border-radius: 8px; margin-left: auto; }
        .qty-btn { padding: 5px 15px; border: none; background: #ff9f43; color: white; cursor: pointer; font-size: 18px; }
        .chip { padding: 8px 12px; background: #f1f2f6; border-radius: 5px; cursor: pointer; }
        .chip.active { background: #ff9f43; color: white; }
        .result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; align-items: center; justify-content: center; }
        .result-box { width: 85%; border-radius: 30px; padding: 40px 20px; text-align: center; color: white; animation: popIn 0.5s ease; }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .res-amount { background: white; padding: 15px; border-radius: 15px; font-size: 32px; font-weight: bold; margin: 20px 0; }
        .input-f { width: 100%; padding: 14px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; outline: none; margin-bottom: 10px; }
        .btn-submit { width: 100%; padding: 16px; background: #00b894; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div id="loginPage">
        <h1 style="margin-bottom: 20px;">KING CLUB</h1>
        <div class="login-box">
            <input type="text" id="lPhone" class="input-f" placeholder="Phone Number">
            <button class="btn-submit" onclick="doLogin()">LOGIN</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div class="nav-bar">
            <div class="nav-item active" onclick="showTab('game', this)">WIN GO</div>
            <div class="nav-item" onclick="showTab('deposit', this)">DEPOSIT</div>
            <div class="nav-item" onclick="showTab('withdraw', this)">WITHDRAW</div>
        </div>

        <div id="gameView" class="view">
            <div class="wallet-card"><h2 id="balDisp" style="font-size:28px;">৳ 0.00</h2></div>
            <div class="timer-box" id="timer">00:30</div>
            
            <div style="display:flex; gap:10px; padding:10px;">
                <button class="btn-submit" style="background:#2ecc71; flex:1" onclick="openBet('Green')">Green</button>
                <button class="btn-submit" style="background:#9b59b6; flex:1" onclick="openBet('Violet')">Violet</button>
                <button class="btn-submit" style="background:#e74c3c; flex:1" onclick="openBet('Red')">Red</button>
            </div>

            <div class="num-grid">
                <script>
                    for(let i=0; i<10; i++) {
                        let c = (i%2==0)?'#e74c3c':'#2ecc71'; if(i==0||i==5) c='#9b59b6';
                        document.write(`<div class="n-btn" style="color:${c}; border-color:${c}" onclick="openBet(${i})">${i}</div>`);
                    }
                </script>
            </div>

            <div style="display:flex; gap:10px; padding:0 15px 15px;">
                <button class="btn-submit" style="background:#f39c12; flex:1" onclick="openBet('Big')">BIG</button>
                <button class="btn-submit" style="background:#3498db; flex:1" onclick="openBet('Small')">SMALL</button>
            </div>

            <div class="chart-header"><div class="col">Number</div><div class="col">Size</div><div class="col">Color</div></div>
            <div id="historyList"></div>
        </div>

        <div id="withdrawView" class="view" style="display:none; padding:15px;">
            <div style="background:#2d3436; padding:20px; border-radius:15px; color:white;">
                <label>Select Method</label>
                <select class="input-f" id="wMethod"><option>Bkash</option><option>Nagad</option></select>
                <input type="number" id="wNum" class="input-f" placeholder="01XXXXXXXXX">
                <input type="number" id="wAmt" class="input-f" placeholder="Enter Amount">
                <button class="btn-submit" style="background:#e74c3c" onclick="handleWithdraw()">Withdraw Request</button>
            </div>
        </div>

        <div id="depositView" class="view" style="display:none; padding:15px;">
            <div style="background:#2d3436; padding:20px; border-radius:15px; color:white;">
                <p id="payNumbers" style="margin-bottom:10px; color:#00b894; font-size:14px;">Bkash: 01992640933 <br> Nagad: 01331025863</p>
                <input type="number" id="dAmt" class="input-f" placeholder="Amount">
                <input type="text" id="dTrx" class="input-f" placeholder="TrxID">
                <button class="btn-submit" onclick="handleDeposit()">Deposit Request</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeBet()"></div>
    <div class="bet-panel" id="betPanel">
        <div style="background:#ff9f43; color:white; padding:12px; text-align:center; border-radius:10px; font-weight:bold; margin-bottom:15px;" id="panelTitle">Select</div>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <div class="chip active" onclick="setBase(1, this)">1</div>
            <div class="chip" onclick="setBase(10, this)">10</div>
            <div class="chip" onclick="setBase(100, this)">100</div>
        </div>
        <div style="display:flex; align-items:center; margin-bottom:15px;">
            <span>Quantity</span>
            <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(-1)">-</button>
                <span id="qtyVal" style="padding:0 20px; font-weight:bold;">1</span>
                <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
        </div>
        <button id="finalBtn" class="btn-submit" style="background:#ff9f43;" onclick="confirmBet()">Total ৳1.00</button>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box" id="resultBox">
            <h2 id="resTitle"></h2>
            <div class="res-amount" id="resAmt">৳ 0.00</div>
            <p>3 seconds auto close</p>
        </div>
    </div>
</div>

<script>
    // ১. ব্যালেন্স শুরুতে ৳ 0.00
    let balance = 0, time = 30, selected = null, currentBetValue = null, userPhone = "";
    let base = 1, qty = 1;

    function doLogin() {
        userPhone = document.getElementById('lPhone').value;
        if(userPhone.length >= 10) {
            let savedBal = localStorage.getItem('bal_' + userPhone);
            balance = savedBal ? parseFloat(savedBal) : 0;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            updateUI();
            updatePayNumbers();
            for(let i=0; i<10; i++) addRecord();
        } else { alert("Enter valid phone number!"); }
    }

    function updateUI() {
        document.getElementById('balDisp').innerText = "৳ " + balance.toFixed(2);
        if(userPhone) localStorage.setItem('bal_' + userPhone, balance);
    }

    // ২. ব্যালেন্স চেক এবং বেট কনফার্মেশন (সংশোধিত)
    function confirmBet() {
        let totalCost = base * qty;
        
        if(balance < totalCost) {
            alert("Insufficient Balance! Please Deposit.");
            currentBetValue = null; // সিলেকশন বাতিল
            closeBet();
            return; // ফাংশন এখানেই শেষ হবে
        }

        // ব্যালেন্স থাকলে টাকা কাটবে এবং বেট ধরবে
        balance -= totalCost;
        currentBetValue = selected; // এখন বেটটি ভ্যালিড হিসেবে গণ্য হবে
        updateUI();
        closeBet();
        alert("Bet Placed: ৳" + totalCost);
    }

    // ৩. রেজাল্ট লজিক (অটো উইন সমস্যা সমাধান)
    setInterval(() => {
        if(time <= 0) {
            let res = addRecord();
            
            // শুধুমাত্র যদি কেউ টাকা দিয়ে বেট ধরে (currentBetValue null না হয়)
            if(currentBetValue !== null) {
                let isWin = (currentBetValue === res.n || currentBetValue === res.s);
                if(isWin) { 
                    let winAmt = (base * qty) * 1.92; 
                    balance += winAmt; 
                    showResult(true, winAmt); 
                } else { 
                    showResult(false, 0); 
                }
                currentBetValue = null; // রাউন্ড শেষ হলে রিসেট
            }
            time = 30; 
            updateUI();
        }
        document.getElementById('timer').innerText = "00:" + (time < 10 ? '0' + time : time);
        time--;
    }, 1000);

    // ৪. অ্যাডমিন এপ্রুভাল ডিটেক্টর
    setInterval(() => {
        let adj = JSON.parse(localStorage.getItem('lastBalanceAdj'));
        if(adj && adj.phone === userPhone) {
            let lastId = localStorage.getItem('lastProcessedAdj');
            if(lastId != adj.timestamp) {
                balance += parseFloat(adj.amount);
                updateUI();
                localStorage.setItem('lastProcessedAdj', adj.timestamp);
                alert("Success: ৳" + adj.amount + " Added to Wallet!");
            }
        }
    }, 2000);

    // বাকি ইউটিলিটি ফাংশন
    function showTab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id + 'View').style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function updatePayNumbers() {
        let b = localStorage.getItem('adminBkash') || "01992640933";
        let n = localStorage.getItem('adminNagad') || "01331025863";
        document.getElementById('payNumbers').innerHTML = `Bkash: ${b} <br> Nagad: ${n}`;
    }

    function addRecord() {
        const list = document.getElementById('historyList');
        let adminNum = localStorage.getItem('adminNextNum');
        let n = (adminNum !== null && adminNum !== "") ? parseInt(adminNum) : Math.floor(Math.random()*10);
        if(adminNum !== null) localStorage.removeItem('adminNextNum');
        let s = n>=5?'Big':'Small';
        let c = (n%2==0)?'#e74c3c':'#2ecc71'; if(n==0||n==5) c='#9b59b6';
        let row = `<div class="chart-row"><div class="col" style="color:${c}; font-weight:bold">${n}</div><div class="col">${s}</div><div class="col"><span style="width:10px;height:10px;background:${c};display:inline-block;border-radius:50%"></span></div></div>`;
        list.insertAdjacentHTML('afterbegin', row);
        if(list.children.length > 10) list.removeChild(list.lastElementChild);
        return {n, s};
    }

    function openBet(val) { 
        selected = val; 
        document.getElementById('overlay').style.display = 'block'; 
        document.getElementById('betPanel').style.display = 'block'; 
    }
    
    function closeBet() { 
        document.getElementById('overlay').style.display = 'none'; 
        document.getElementById('betPanel').style.display = 'none'; 
    }
    
    function setBase(v, el) { 
        base = v; 
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active')); 
        el.classList.add('active'); 
        updateTotal(); 
    }
    
    function changeQty(v) { 
        qty += v; 
        if(qty < 1) qty = 1; 
        document.getElementById('qtyVal').innerText = qty; 
        updateTotal(); 
    }
    
    function updateTotal() { 
        document.getElementById('finalBtn').innerText = "Total ৳" + (base * qty).toFixed(2); 
    }

    function handleDeposit() {
        let amt = document.getElementById('dAmt').value;
        let trx = document.getElementById('dTrx').value;
        if(!amt || !trx) return alert("Fill all fields!");
        let req = { type: 'Deposit', user: userPhone, amount: amt, details: "Trx: "+trx, time: new Date().toLocaleTimeString() };
        let all = JSON.parse(localStorage.getItem('kingRequests')) || [];
        all.push(req);
        localStorage.setItem('kingRequests', JSON.stringify(all));
        alert("Request Sent!");
    }

    function handleWithdraw() {
        let amt = document.getElementById('wAmt').value;
        let num = document.getElementById('wNum').value;
        if(balance < amt) return alert("Low Balance!");
        let req = { type: 'Withdraw', user: userPhone, amount: amt, details: "To: "+num, time: new Date().toLocaleTimeString() };
        let all = JSON.parse(localStorage.getItem('kingRequests')) || [];
        all.push(req);
        localStorage.setItem('kingRequests', JSON.stringify(all));
        balance -= amt; updateUI();
        alert("Withdraw Request Sent!");
    }

    function showResult(win, amt) {
        const overlay = document.getElementById('resultOverlay');
        const box = document.getElementById('resultBox');
        if(win) {
            box.style.background = "linear-gradient(180deg, #ff7e5f, #feb47b)";
            document.getElementById('resTitle').innerText = "Win!";
            document.getElementById('resAmt').innerText = "৳ " + amt.toFixed(2);
        } else {
            box.style.background = "#576574";
            document.getElementById('resTitle').innerText = "Loss";
            document.getElementById('resAmt').innerText = "৳ 0.00";
        }
        overlay.style.display = 'flex';
        setTimeout(() => overlay.style.display = 'none', 3000);
    }
</script>

</body>
</html>
